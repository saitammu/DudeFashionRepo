services:
  - type: web
    name: dudefashion
    env: python
    buildCommand: "sh build.sh"
    startCommand: "gunicorn trendzone.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dudefashion-db
          property: connectionString

databases:
  - name: dudefashion-db
    plan: free
