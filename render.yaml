services:
  - type: web
    name: dudefashion
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn trendzone.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
